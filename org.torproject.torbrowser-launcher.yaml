  - name: torbrowser-launcher
    buildsystem: simple
    sources:
      - type: archive
        url: https://gitlab.torproject.org/tpo/applications/torbrowser-launcher/-/archive/v0.3.9/torbrowser-launcher-v0.3.9.tar.gz
        sha256: 267483c88760dacf4af2d480d2d0b094f3ffd10f8fd0f3e5f52c61df91e9ccdb
        x-checker-data:
          type: anitya
          project-id: 6359
          url-template: https://gitlab.torproject.org/tpo/applications/torbrowser-launcher/-/archive/v$version/torbrowser-launcher-v$version.tar.gz
      - type: patch
        path: use-flatpak-sys-prefix.patch
      - type: patch
        path: metainfo-add-bug-tracker.patch
    build-commands:
      - python3 setup.py install --prefix=${FLATPAK_DEST} --root=/ --optimize=1
